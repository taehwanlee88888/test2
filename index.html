html<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카페 쉴가 (Rest Cafe)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
        }

        /* 사막 오아시스 배경화면 고정 */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('https://unsplash.com') no-repeat center center/cover;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        /* 페이지 전환용 위치 설정 */
        #home-page { transform: translateX(0%); }
        #qa-page { transform: translateX(100%); }

        .active #home-page { transform: translateX(-100%); }
        .active #qa-page { transform: translateX(0%); }

        /* 왼쪽 상단 다음 날씨 위젯 영역 */
        .weather-widget {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.85);
            color: #333;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .weather-widget a {
            color: #1e90ff;
            text-decoration: none;
            display: block;
            margin-top: 4px;
            font-size: 12px;
        }

        /* 메인 콘텐츠 스타일 */
        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #ffe4b5;
            letter-spacing: 2px;
        }

        .vision {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #f5f5f5;
            line-height: 1.6;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            text-align: left;
        }

        .info-box h3 {
            color: #ffe4b5;
            margin-bottom: 8px;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 4px;
        }

        .info-box p {
            font-size: 0.95rem;
            color: #e0e0e0;
            line-height: 1.5;
        }

        /* 버튼 스타일 */
        .btn {
            background: #d2b48c;
            color: #332211;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: #ffe4b5;
            transform: translateY(-2px);
        }

        /* 질의하기 폼 스타일 */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 1rem;
            color: #ffe4b5;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            font-size: 1rem;
        }

        .form-group textarea {
            height: 120px;
            resize: none;
        }

        .btn-submit {
            background: #4caf50;
            color: white;
            margin-right: 10px;
        }

        .btn-submit:hover {
            background: #45a049;
        }

        .btn-back {
            background: #757575;
            color: white;
        }

        .btn-back:hover {
            background: #616161;
        }
    </style>
</head>
<body id="body-wrapper">

    <!-- 첫 번째 페이지: 홈 화면 -->
    <div id="home-page" class="page">
        <!-- 왼쪽 상단 다음 날씨 연동 영역 -->
        <div class="weather-widget">
            ☀️ 오늘 서울/용인 날씨
            <a href="https://daum.net" target="_blank">▶ daum.net 날씨 보기</a>
        </div>

        <div class="container">
            <h1>카페 쉴가</h1>
            <p class="vision">"사막 속 오아시스처럼, 예배 전후 영육이 쉼을 얻는 공간"</p>
            
            <div class="info-section">
                <div class="info-box">
                    <h3>메뉴 (Menu)</h3>
                    <p>☕ 아아 (아이스 아메리카노)</p>
                    <p>♨️ 핫아 (따뜻한 아메리카노)</p>
                </div>
                <div class="info-box">
                    <h3>운영 시간</h3>
                    <p>토요일: 10:00 ~ 18:00</p>
                    <p>일요일: 09:00 ~ 18:00</p>
                </div>
                <div class="info-box">
                    <h3>이용 대상</h3>
                    <p>향상교회 성도 및</p>
                    <p>지역사회 주민 누구나</p>
                </div>
                <div class="info-box">
                    <h3>카페 비전</h3>
                    <p>교회 구성원이 예배 전후</p>
                    <p>편안히 쉬어가는 카페</p>
                </div>
            </div>

            <!-- 질의하기 페이지로 넘어가기 버튼 -->
            <button class="btn" onclick="togglePage()">질의하기</button>
        </div>
    </div>

    <!-- 두 번째 페이지: 질의하기 화면 -->
    <div id="qa-page" class="page">
        <div class="container">
            <h2 style="font-size: 2rem; margin-bottom: 20px; color: #ffe4b5;">카페 쉴가에 문의하기</h2>
            
            <form onsubmit="submitForm(event)">
                <div class="form-group">
                    <label for="userName">이름 / 교인 여부</label>
                    <input type="text" id="userName" placeholder="예: 홍길동 (향상교인)" required>
                </div>
                <div class="form-group">
                    <label for="question">질문 내용</label>
                    <textarea id="question" placeholder="카페 쉴가에 궁금한 점을 남겨주세요." required></textarea>
                </div>
                
                <button type="submit" class="btn btn-submit">문의 제출</button>
                <button type="button" class="btn btn-back" onclick="togglePage()">돌아가기</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://joqbafyoxpoihllndekt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpvcWJhZnlveHBvaWhsbG5kZWt0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxMzE5MjYsImV4cCI6MjA5NTcwNzkyNn0.9GPx73acZ0kyUscJLzofMn3HIINxG_83paTSPCA3vqI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function togglePage() {
            const body = document.getElementById('body-wrapper');
            body.classList.toggle('active');
        }

        async function submitForm(event) {
            event.preventDefault();
            const name = document.getElementById('userName').value;
            const question = document.getElementById('question').value;
            const submitBtn = event.target.querySelector('.btn-submit');

            submitBtn.disabled = true;
            submitBtn.textContent = '제출 중...';

            const { error } = await supabase
                .from('inquiries')
                .insert([{ name, question }]);

            if (error) {
                alert('문의 제출 중 오류가 발생했습니다. 다시 시도해주세요.');
                console.error(error);
            } else {
                alert(`${name}님, 소중한 문의가 접수되었습니다!`);
                document.getElementById('userName').value = '';
                document.getElementById('question').value = '';
                togglePage();
            }

            submitBtn.disabled = false;
            submitBtn.textContent = '문의 제출';
        }
    </script>
</body>
</html>
